services:
  # Backend API
  - type: web
    name: automatejobs-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DB_NAME
        value: automatejobs
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: automatejobs-frontend
          property: host
    healthCheckPath: /api/

  # Frontend Static Site
  - type: web
    name: automatejobs-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: yarn install && yarn build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_BACKEND_URL
        fromService:
          type: web
          name: automatejobs-backend
          property: host
